name: Deploy to GitHub Pages

on:
  push:
    branches: [main, "claude/github-pages-deploy-CzimQ"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # カスタムドメイン使用時は vars.BASE_URL を "/" に設定する
      - run: npm run build
        env:
          BASE_URL: ${{ vars.BASE_URL || '/Web_QRtoDXF/' }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
